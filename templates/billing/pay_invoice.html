{% extends 'base.html' %}

{% block title %}Pay Invoice - VetSphere{% endblock %}

{% block content %}
<div class="container">
<div style="max-width: 460px; margin: 3rem auto;">
    <div style="background: var(--card-bg); padding: 2.5rem; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); text-align: center; border: 1px solid var(--border);">
        <div style="width: 52px; height: 52px; background: var(--gradient-primary); color: white; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; margin: 0 auto 1.25rem; box-shadow: 0 8px 20px rgba(15, 118, 110, 0.25);">
            <i class="fas fa-credit-card"></i>
        </div>
        <h1 style="margin-bottom: 0.5rem; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.02em;">Complete Payment</h1>
        <p style="color: var(--text-muted); margin-bottom: 1.75rem; font-size: 0.9rem;">
            Invoice #{{ invoice.pk }} for {{ invoice.booking.pet.name }}
        </p>

        <div style="background: var(--bg-subtle); padding: 1.25rem; border-radius: var(--radius); margin-bottom: 1.75rem; border: 1px solid var(--border);">
            <p style="font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 0.25rem;">Amount Due</p>
            <h2 style="font-size: 2.25rem; color: var(--primary); font-weight: 800;">₹{{ invoice.amount }}</h2>
        </div>

        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 1.75rem; text-align: left;">
                <label for="payment_method" style="display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; font-weight: 600;">Payment Method</label>
                <select name="payment_method" id="payment_method" required
                    style="width: 100%; padding: 0.85rem; border-radius: var(--radius); border: 1.5px solid var(--input-border); background: var(--input-bg); color: var(--text-main); appearance: none; font-size: 0.9rem; font-family: inherit; cursor: pointer;">
                    <option value="digital">Digital Payment</option>
                    <option value="cash">Cash</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem; font-size: 0.95rem; font-weight: 700;">
                <i class="fas fa-lock"></i> Complete Payment
            </button>
            <a href="{% url 'generate_invoice_pdf' invoice.pk %}" class="btn" style="width: 100%; margin-top: 0.6rem; padding: 0.8rem; background: var(--bg-subtle); color: var(--text-muted); border: 1px solid var(--border);">
                <i class="fas fa-file-pdf"></i> Download Invoice
            </a>
            <a href="{% url 'invoice_list' %}" style="display: block; margin-top: 1.25rem; color: var(--text-muted); font-size: 0.85rem;">Cancel and Back to List</a>
        </form>

        <div style="margin-top: 1.75rem; display: flex; justify-content: center; gap: 1.25rem; color: var(--text-faint); font-size: 1.35rem;">
            <i class="fas fa-money-bill-wave" title="Cash"></i>
            <i class="fas fa-mobile-alt" title="Digital Payment"></i>
            <i class="fab fa-google-pay" title="Google Pay"></i>
            <i class="fab fa-apple-pay" title="Apple Pay"></i>
            <i class="fas fa-university" title="Net Banking"></i>
        </div>
    </div>
</div>
</div>
{% endblock %}
