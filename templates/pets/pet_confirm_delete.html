{% extends 'base.html' %}

{% block title %}Delete Pet - VetSphere{% endblock %}

{% block content %}
<div class="container">
<div style="max-width: 460px; margin: 4rem auto; text-align: center;">
    <div style="background: var(--card-bg); padding: 3rem; border-radius: var(--radius-xl); box-shadow: var(--shadow); border: 1px solid var(--border);">
        <div style="width: 56px; height: 56px; background: var(--alert-error-bg); color: var(--alert-error-text); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1.5rem;">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 style="margin-bottom: 0.75rem; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.02em;">Are you sure?</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">
            You are about to delete <strong style="color: var(--text-main);">{{ pet.name }}</strong>. This action cannot be undone.
        </p>

        <form method="post">
            {% csrf_token %}
            <div style="display: flex; gap: 0.75rem; justify-content: center;">
                <button type="submit" class="btn" style="background: var(--alert-error-text); color: white; padding: 0.75rem 1.5rem; border: none;">
                    <i class="fas fa-trash"></i> Delete Pet
                </button>
                <a href="{% url 'pet_list' %}" class="btn" style="background: var(--bg-subtle); color: var(--text-muted); border: 1px solid var(--border); padding: 0.75rem 1.5rem;">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
